<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>École de Musique</title>
    <style>
        .btn-pink { background-color: #d63384; color: white; border: none; }
        .btn-pink:hover { background-color: #b8226b; color: white; }
        .card-pink { border-top: 5px solid #d63384; transition: 0.3s; }
        .card-pink:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body style="background-color: #fdf2f8;">

<div class="container text-center mt-5">
    <h1 class="mb-5 fw-bold" style="color: #4a132c;">🎵 École de Musique Management</h1>

    <div class="row g-4 justify-content-center">
        <div class="col-md-3">
            <div class="card h-100 shadow-sm card-pink">
                <div class="card-body">
                    <div class="fs-1 mb-2">🎸</div>
                    <h5 class="card-title">Instruments</h5>
                    <a href="/instruments" class="btn btn-pink mt-3 w-100">Gérer</a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card h-100 shadow-sm card-pink">
                <div class="card-body">
                    <div class="fs-1 mb-2">👨‍🏫</div>
                    <h5 class="card-title">Professeurs</h5>
                    <a href="/profs" class="btn btn-pink mt-3 w-100">L'Équipe</a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card h-100 shadow-sm card-pink">
                <div class="card-body">
                    <div class="fs-1 mb-2">📚</div>
                    <h5 class="card-title">Cours</h5>
                    <a href="/cours" class="btn btn-pink mt-3 w-100">Planning</a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card h-100 shadow-sm card-pink">
                <div class="card-body">
                    <div class="fs-1 mb-2">📊</div>
                    <h5 class="card-title">Statistiques</h5>
                    <a href="/cours/stats" class="btn btn-pink mt-3 w-100">Données</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
