<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Ajouter Professeur</title>
</head>
<body style="background-color: #fdf2f8;">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0" style="border-top: 5px solid #d63384; border-radius: 15px;">
                <div class="card-body p-4">
                    <h3 class="fw-bold mb-4" style="color: #d63384;">👨‍🏫 Nouveau Professeur</h3>

                    <form th:action="@{/profs/save}" th:object="${prof}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nom Complet</label>
                            <input type="text" th:field="*{nom}" class="form-control shadow-sm" placeholder="Ex: M. Yassine" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Spécialité / Instrument</label>
                            <input type="text" th:field="*{specialite}" class="form-control shadow-sm" placeholder="Ex: Violon, Chant">
                        </div>

                        <button type="submit" class="btn w-100 fw-bold" style="background-color: #d63384; color: white; padding: 12px;">
                            Enregistrer le profil
                        </button>
                        <a href="/profs" class="btn btn-link w-100 mt-2 text-decoration-none" style="color: #d63384;">Annuler</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
