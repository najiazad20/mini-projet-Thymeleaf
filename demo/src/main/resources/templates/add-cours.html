<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #fdf2f8;">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow p-4 border-0" style="border-top: 5px solid #d63384;">
                <h3 class="mb-4 fw-bold" style="color: #d63384;">➕ Planifier un Cours</h3>

                <form action="/cours/save" method="post">
                    <div class="mb-3">
                        <label class="form-label">Jour de la semaine</label>
                        <input name="jour" class="form-control" placeholder="Lundi, Mardi..." required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Niveau</label>
                        <input name="niveau" class="form-control" placeholder="Débutant, Moyen..." required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Choisir un Professeur</label>
                        <select name="prof.id" class="form-select" required>
                            <option value="">-- Sélectionner --</option>
                            <option th:each="p : ${profs}" th:value="${p.id}" th:text="${p.nom}"></option>
                        </select>
                        <small class="text-muted">Si la liste est vide, ajoutez d'abord un prof dans la section Professeurs.</small>
                    </div>

                    <button type="submit" class="btn w-100" style="background-color: #d63384; color: white;">Enregistrer</button>
                    <a href="/cours" class="btn btn-light w-100 mt-2">Annuler</a>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
