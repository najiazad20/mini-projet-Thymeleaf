<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .header-pink { background-color: #d63384; color: white; }
        .text-pink { color: #d63384; }
    </style>
</head>
<body style="background-color: #fdf2f8;">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-pink">📚 Liste des Cours Programmés</h2>
        <a href="/cours/add" class="btn btn-outline-danger">+ Nouveau Cours</a>
    </div>

    <div class="card shadow-sm border-0">
        <table class="table table-hover m-0">
            <thead class="header-pink">
            <tr>
                <th>Jour</th>
                <th>Niveau</th>
                <th>Professeur</th>
                <th class="text-center">Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${cours}">
                <td th:text="${c.jour}" class="fw-bold"></td>
                <td><span class="badge bg-light text-dark" th:text="${c.niveau}"></span></td>
                <td th:text="${c.prof != null ? c.prof.nom : 'Non assigné'}"></td>
                <td class="text-center">
                    <a th:href="@{/cours/edit/{id}(id=${c.id})}" class="btn btn-sm btn-outline-info me-2">Modifier</a>
                    <a th:href="@{/cours/delete/{id}(id=${c.id})}" class="btn btn-sm btn-danger">Supprimer</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(cours)}">
                <td colspan="4" class="text-center py-4 text-muted">Aucun cours planifié pour le moment.</td>
            </tr>
            </tbody>
        </table>
    </div>
    <div class="mt-3 text-center">
        <a href="/" class="text-pink fw-bold" style="text-decoration: none;">← Retour à l'accueil</a>
    </div>
</div>
<div class="card p-3 mb-4 border-0 shadow-sm" style="background-color: #fce7f3;">
    <form action="/cours/filter" method="get" class="row g-2">
        <div class="col-md-4">
            <input name="niveau" class="form-control" placeholder="Niveau (ex: Débutant)">
        </div>
        <div class="col-md-4">
            <select name="jour" class="form-select">
                <option value="">Tous les jours</option>
                <option value="Lundi">Lundi</option>
                <option value="Mardi">Mardi</option>
            </select>
        </div>
        <div class="col-md-4">
            <button class="btn w-100 fw-bold" style="background-color: #d63384; color: white;">🔍 Filtrer</button>
        </div>
    </form>
</div>

</body>
</html>
