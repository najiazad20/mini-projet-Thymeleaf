<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Professeurs - École de Musique</title>
</head>
<body style="background-color: #fdf2f8;">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold" style="color: #d63384;">👨‍🏫 Nos Professeurs</h2>
        <a href="/profs/add" class="btn btn-outline-danger">+ Ajouter un Professeur</a>
    </div>

    <div class="row g-3">
        <div class="col-md-4" th:each="p : ${profs}">
            <div class="card shadow-sm border-0" style="border-left: 5px solid #d63384; border-radius: 10px;">
                <div class="card-body">
                    <h5 class="fw-bold mb-1" th:text="${p.nom}">Nom du Prof</h5>
                    <p class="text-muted small mb-3" th:text="${p.specialite}">Spécialité</p>

                    <div class="d-flex justify-content-end border-top pt-2">
                        <a th:href="@{/profs/edit/{id}(id=${p.id})}"
                           class="btn btn-sm btn-link text-primary p-0 me-3"
                           style="text-decoration: none; font-weight: bold;">✏️ Modifier</a>

                        <a th:href="@{/profs/delete/{id}(id=${p.id})}"
                           class="btn btn-sm btn-link text-danger p-0"
                           style="text-decoration: none; font-weight: bold;"
                           onclick="return confirm('Supprimer ce professeur ?')">🗑️ Supprimer</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 text-center py-5 text-muted" th:if="${#lists.isEmpty(profs)}">
            Aucun professeur n'est enregistré pour le moment.
        </div>
    </div>

    <div class="mt-4 text-center">
        <a href="/" class="text-pink fw-bold" style="color: #d63384; text-decoration: none;">← Retour à l'accueil</a>
    </div>
</div>

</body>
</html>
