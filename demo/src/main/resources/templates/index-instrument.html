<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .header-pink { background-color: #d63384; color: white; }
        .text-pink { color: #d63384; }
        .bg-light-pink { background-color: #fdf2f8; }
    </style>
</head>
<body class="bg-light-pink">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-pink">🎸 Inventaire des Instruments</h2>
        <a href="/instruments/add" class="btn btn-outline-danger">+ Ajouter Instrument</a>
    </div>

    <div class="card shadow-sm border-0">
        <table class="table table-hover m-0">
            <thead class="header-pink">
            <tr>
                <th>Nom</th>
                <th>Famille</th>
                <th>Disponibilité</th>
                <th class="text-center">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="i : ${instruments}">
                <td th:text="${i.nom}" class="fw-bold"></td>
                <td th:text="${i.famille}"></td>
                <td>
                    <span th:if="${i.disponibilite}" class="badge bg-success">Disponible</span>
                    <span th:unless="${i.disponibilite}" class="badge bg-secondary">Occupé</span>
                </td>
                <td class="text-center">
                    <a th:href="@{/instruments/edit/{id}(id=${i.id})}" class="btn btn-sm btn-outline-primary me-2">✏️ Modifier</a>
                    <a th:href="@{/instruments/delete/{id}(id=${i.id})}" class="btn btn-sm btn-outline-danger">Supprimer</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(instruments)}">
                <td colspan="4" class="text-center py-4 text-muted">Aucun instrument enregistré.</td>
            </tr>
            </tbody>
        </table>
    </div>
    <div class="mt-3 text-center">
        <a href="/" class="text-pink fw-bold" style="text-decoration: none;">← Retour à l'accueil</a>
    </div>
</div>
<div class="card p-4 mb-4 border-0 shadow-sm" style="background-color: #fce7f3; border-radius: 15px;">
    <h5 class="fw-bold mb-3" style="color: #d63384;">🔍 Rechercher un Instrument</h5>
    <form action="/instruments/filter" method="get" class="row g-3 align-items-end">

        <div class="col-md-4">
            <label class="form-label small fw-bold">Famille</label>
            <select name="famille" class="form-select border-0 shadow-sm">
                <option value="">Toutes les familles</option>
                <option value="Cordes">Cordes</option>
                <option value="Vents">Vents</option>
                <option value="Claviers">Claviers</option>
                <option value="Percussions">Percussions</option>
            </select>
        </div>

        <div class="col-md-4">
            <label class="form-label small fw-bold">État</label>
            <select name="disponibilite" class="form-select border-0 shadow-sm">
                <option value="">Tous les états</option>
                <option value="true">Disponible ✅</option>
                <option value="false">Occupé ❌</option>
            </select>
        </div>

        <div class="col-md-4">
            <button type="submit" class="btn w-100 fw-bold shadow-sm" style="background-color: #d63384; color: white;">
                Filtrer la liste
            </button>
        </div>
    </form>
</div>

</body>
</html>
