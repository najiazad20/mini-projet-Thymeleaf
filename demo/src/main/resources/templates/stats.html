<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Statistiques - École de Musique</title>
</head>
<body style="background-color: #fdf2f8;">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-5 shadow-lg border-0" style="border-radius: 20px;">
                <h2 class="fw-bold text-center mb-5" style="color: #4a132c;">📊 Tableau de Bord</h2>

                <div class="text-center py-4 mb-5" style="background-color: #fce7f3; border-radius: 15px;">
                    <h5 class="text-uppercase text-muted small fw-bold">Nombre Total de Cours</h5>
                    <div class="display-1 fw-bold" style="color: #d63384;" th:text="${totalCours}">0</div>
                </div>

                <h4 class="fw-bold mb-4" style="color: #d63384;">📈 Popularité des Instruments</h4>

                <div class="mb-4">
                    <div class="d-flex justify-content-between mb-1">
                        <span>🎹 Piano</span>
                        <span class="fw-bold">45%</span>
                    </div>
                    <div class="progress" style="height: 10px;">
                        <div class="progress-bar" role="progressbar" style="width: 45%; background-color: #d63384;"></div>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between mb-1">
                        <span>🎸 Guitare</span>
                        <span class="fw-bold">30%</span>
                    </div>
                    <div class="progress" style="height: 10px;">
                        <div class="progress-bar" role="progressbar" style="width: 30%; background-color: #d63384; opacity: 0.8;"></div>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between mb-1">
                        <span>🎻 Violon</span>
                        <span class="fw-bold">15%</span>
                    </div>
                    <div class="progress" style="height: 10px;">
                        <div class="progress-bar" role="progressbar" style="width: 15%; background-color: #d63384; opacity: 0.6;"></div>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between mb-1">
                        <span>🎤 Autres (Chant/Batterie)</span>
                        <span class="fw-bold">10%</span>
                    </div>
                    <div class="progress" style="height: 10px;">
                        <div class="progress-bar" role="progressbar" style="width: 10%; background-color: #d63384; opacity: 0.4;"></div>
                    </div>
                </div>

                <div class="row mt-5">
                    <div class="col">
                        <a href="/cours" class="btn btn-outline-dark w-100 fw-bold">Planning</a>
                    </div>
                    <div class="col">
                        <a href="/" class="btn btn-dark w-100 fw-bold">Accueil</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
